name: Build unsigned IPA

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build app without code signing
        run: |
          xcodebuild \
            -project BasicIPA.xcodeproj \
            -scheme BasicIPA \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            clean build

      - name: Package unsigned IPA
        run: |
          APP_PATH="build/Build/Products/Release-iphoneos/BasicIPA.app"
          mkdir -p Payload
          cp -R "$APP_PATH" Payload/
          zip -qry BasicIPA-unsigned.ipa Payload

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: BasicIPA-unsigned
          path: BasicIPA-unsigned.ipa
